{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Passwort setzen" %}{% endblock %}

{% block content %}
<h1>{% trans "Passwort setzen für" %} {{ target_user.username }}</h1>
<form method="post" novalidate>
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit">{% trans "Passwort setzen" %}</button>
</form>
<a href="{% url 'accounts:user-detail' target_user.pk %}">{% trans "Abbrechen" %}</a>
{% endblock %}
