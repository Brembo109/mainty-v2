{% load i18n %}
<div id="notification-panel"
     class="fixed left-[232px] top-16 z-50 w-80 bg-surface-elevated border border-border rounded-lg shadow-xl overflow-hidden">

  <div class="flex items-center justify-between px-4 py-3 border-b border-border">
    <span class="text-xs font-semibold text-content-primary uppercase tracking-wider">
      {% trans "Benachrichtigungen" %}
    </span>
    <div class="flex items-center gap-3">
      {% if notifications %}
      <form method="post"
            action="{% url 'notifications:mark-all-read' %}"
            hx-post="{% url 'notifications:mark-all-read' %}"
            hx-target="#notification-panel"
            hx-swap="outerHTML"
            hx-boost="false">
        {% csrf_token %}
        <button type="submit"
                class="text-2xs text-content-tertiary hover:text-content-primary transition-colors">
          {% trans "Alle gelesen" %}
        </button>
      </form>
      {% endif %}
      <button type="button"
              onclick="document.getElementById('notification-panel').outerHTML='<div id=&quot;notification-panel&quot;></div>'"
              class="text-content-tertiary hover:text-content-primary transition-colors"
              title="{% trans 'Schließen' %}">
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
  </div>

  {% if notifications %}
  <ul class="divide-y divide-border max-h-96 overflow-y-auto">
    {% for n in notifications %}
    <li class="flex items-start gap-3 px-4 py-3 hover:bg-surface-card transition-colors">
      <p class="flex-1 text-xs text-content-secondary leading-relaxed">{{ n.message }}</p>
      <form method="post"
            action="{% url 'notifications:mark-read' pk=n.pk %}"
            hx-post="{% url 'notifications:mark-read' pk=n.pk %}"
            hx-target="#notification-panel"
            hx-swap="outerHTML"
            hx-boost="false"
            class="shrink-0">
        {% csrf_token %}
        <button type="submit"
                class="text-content-tertiary hover:text-content-primary transition-colors"
                title="{% trans 'Als gelesen markieren' %}">
          <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
          </svg>
        </button>
      </form>
    </li>
    {% endfor %}
  </ul>
  {% else %}
  <p class="px-4 py-6 text-xs text-content-tertiary text-center">
    {% trans "Keine neuen Benachrichtigungen" %}
  </p>
  {% endif %}

</div>
